<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E07B00"/>
    </linearGradient>
    <linearGradient id="windowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD580"/>
      <stop offset="100%" stop-color="#FF9500"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE8A0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="224" fill="url(#bodyGrad)"/>

  <!-- Oven body -->
  <rect x="120" y="160" width="784" height="704" rx="48"
        fill="#CC6B00" opacity="0.35"/>

  <!-- Oven door face -->
  <rect x="148" y="188" width="728" height="648" rx="40"
        fill="#1A0A00" opacity="0.55"/>

  <!-- Door window — outer frame -->
  <rect x="232" y="272" width="560" height="400" rx="56"
        fill="#2C1400"/>

  <!-- Door window — inner glow -->
  <rect x="256" y="296" width="512" height="352" rx="44"
        fill="url(#windowGrad)" opacity="0.9"/>

  <!-- Heat glow inside window -->
  <ellipse cx="512" cy="472" rx="200" ry="140"
           fill="url(#glowGrad)"/>

  <!-- Heating element — top -->
  <path d="M 320 360 Q 360 336 400 360 Q 440 384 480 360 Q 520 336 560 360 Q 600 384 640 360 Q 680 336 704 360"
        fill="none" stroke="#FF4400" stroke-width="18" stroke-linecap="round" opacity="0.8"/>

  <!-- Heating element — bottom -->
  <path d="M 320 580 Q 360 556 400 580 Q 440 604 480 580 Q 520 556 560 580 Q 600 604 640 580 Q 680 556 704 580"
        fill="none" stroke="#FF4400" stroke-width="18" stroke-linecap="round" opacity="0.8"/>

  <!-- Control panel — top strip -->
  <rect x="148" y="736" width="728" height="100" rx="0"
        fill="#1A0A00" opacity="0.4"/>
  <rect x="148" y="826" width="728" height="10" rx="0"
        fill="#CC6B00" opacity="0.6"/>

  <!-- Knobs -->
  <circle cx="340" cy="786" r="30" fill="#2C1400"/>
  <circle cx="340" cy="786" r="18" fill="#CC6B00"/>
  <circle cx="340" cy="786" r="8"  fill="#FF9500"/>

  <circle cx="512" cy="786" r="30" fill="#2C1400"/>
  <circle cx="512" cy="786" r="18" fill="#CC6B00"/>
  <circle cx="512" cy="786" r="8"  fill="#FF9500"/>

  <circle cx="684" cy="786" r="30" fill="#2C1400"/>
  <circle cx="684" cy="786" r="18" fill="#CC6B00"/>
  <circle cx="684" cy="786" r="8"  fill="#FF9500"/>

  <!-- Door handle -->
  <rect x="362" y="150" width="300" height="44" rx="22"
        fill="#CC6B00"/>
  <rect x="370" y="156" width="284" height="32" rx="16"
        fill="#E8890A"/>
</svg>